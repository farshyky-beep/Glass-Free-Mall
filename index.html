<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية Glass Free | الأرباح العالمية</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        .header { background: linear-gradient(45deg, #ffd700, #ffa500); color: #000; padding: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; padding: 20px; }
        .card { background: #111; border: 1px solid #ffd700; border-radius: 15px; padding: 20px; text-decoration: none; color: white; display: block; }
        .money-box { background: #222; border: 2px dashed #ff0000; margin: 10px; padding: 20px; color: #ff0000; }
    </style>
</head>
<body>
    <div class="header"><h1>💎 GLASS FREE MALL</h1></div>
    <div class="money-box">💰 مساحة إعلان حقيقي 💰</div>
    <div class="grid">
        <a href="https://www.youtube.com" class="card">🎬 أفلام</a>
        <a href="https://www.shein.com" class="card">💄 مكياج</a>
        <a href="https://www.crazygames.com" class="card">🎮 ألعاب</a>
        <a href="https://www.google.com" class="card">📰 أخبار</a>
    </div>
    <div class="money-box">💰 مساحة إعلان حقيقي 💰</div>
</body>
</html>
